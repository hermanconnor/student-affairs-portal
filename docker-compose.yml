services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_affairs
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_affairs"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder # Keeps devDependencies (tsx watch) accessible
    command: npm run dev
    restart: unless-stopped
    ports:
      - '5000:5000' # Maps host port 5000 to container port 5000
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/student_affairs
    depends_on:
      postgres:
        condition: service_healthy # Prevents race conditions during DB boot
    volumes:
      - ./backend:/app # Tracks local file changes dynamically
      - /app/node_modules # Protects container binaries from host file clobbering

volumes:
  postgres_data: